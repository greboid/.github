name: Build and push container

on:
  workflow_call:
    inputs:
      registry:
        required: false
        type: string
        default: 'ghcr.io'
      dockerfile:
        required: false
        type: string
        default: 'Dockerfile'
      image:
        required: false
        type: string
        default: ${{ github.repository }}
      build-args:
        required: false
        type: string
        default: ''
      preloginreg:
        required: false
        type: boolean
        default: false
      preloginghcr:
        required: false
        type: boolean
        default: false
    secrets:
      REGISTRY_USER:
        required: false
      REGISTRY_PASS:
        required: false

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:

      - name: Ensure docker config exists
        run: mkdir -p ~/.docker && touch ~/.docker/config.json

      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate tags
        id: tags
        uses: greboid/docker-tags-action@v6.0.6
        with:
          separator: ' '
          fullname: 'false'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate registry credentials
        if: inputs.registry != 'ghcr.io'
        run: |
          if [[ -z "${{ secrets.REGISTRY_USER }}" ]] || [[ -z "${{ secrets.REGISTRY_PASS }}" ]]; then
            echo "::error::REGISTRY_USER and REGISTRY_PASS secrets are required when pushing to a non-GHCR registry"
            exit 1
          fi

      - name: Pre-login GHCR
        if: ${{ inputs.preloginghcr }}
        run: podman login -u '${{ github.repository_owner }}' -p '${{ secrets.GHCR_TOKEN }}' ghcr.io

      - name: Pre-login Registry
        if: ${{ inputs.preloginreg }}
        run: podman login -u '${{ secrets.REGISTRY_USER }}' -p '${{ secrets.REGISTRY_PASS }}' '${{ inputs.registry }}'

      - name: Build image
        id: build-image
        run: |
          TAG_ARGS=""
          for tag in ${{ steps.tags.outputs.tags }}; do
            TAG_ARGS="${TAG_ARGS} -t ${{ inputs.image }}:${tag}"
          done
          BUILD_ARGS=""
          if [[ -n "${{ inputs.build-args }}" ]]; then
            while IFS= read -r arg; do
              [[ -n "${arg}" ]] && BUILD_ARGS="${BUILD_ARGS} --build-arg ${arg}"
            done <<< "${{ inputs.build-args }}"
          fi
          buildah bud \
            -f ${{ inputs.dockerfile }} \
            ${TAG_ARGS} \
            --timestamp 0 \
            ${BUILD_ARGS} \
            .

      - name: Push to GHCR
        if: inputs.registry == 'ghcr.io'
        run: |
          podman login -u '${{ github.repository_owner }}' -p '${{ secrets.GITHUB_TOKEN }}' ghcr.io
          for tag in ${{ steps.tags.outputs.tags }}; do
            podman push '${{ inputs.image }}:${tag}' '${{ inputs.registry }}/${{ inputs.image }}:${tag}'
          done

      - name: Push to Registry
        if: inputs.registry != 'ghcr.io'
        run: |
          podman login -u '${{ secrets.REGISTRY_USER }}' -p '${{ secrets.REGISTRY_PASS }}' '${{ inputs.registry }}'
          for tag in ${{ steps.tags.outputs.tags }}; do
            podman push '${{ inputs.image }}:${tag}' '${{ inputs.registry }}/${{ inputs.image }}:${tag}'
          done
